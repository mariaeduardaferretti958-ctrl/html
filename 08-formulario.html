<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario em html 5</title>
</head>
<body>
    <h1>formulario em html 5</h1>
    <h3>Cadrasto de novo usuario</h3>

    <form action="">
        <label for="nome">Nome completo</label>
        <br>
        <input 
            type="text" 
            name="nome" 
            id="nome"
            placeholder="Digite seu nome completo"
            required
        >
        <br><br>
        <label for="Email">Email</label>
        <br>
        <input 
            type="Email" 
            name="email" 
            id="email"
            placeholder="Digite seu e-mail"
            required
        >
        <br><br>
        <label for="senha">senha</label>
        <br>
        <input 
            type="password" 
            name="Senha" 
            id="Senha"
            placeholder="Digite sua senha"
            required
        >
        <br><br>
        <label for="Data de nacimento">Data de nacimento</label>
        <br>
        <input 
            type="date" 
            name="Data de nacimento" 
            id="Data de nacimento"
            required
        >
        <br><br>
        <label for="genero">Genero</label>
        <br>        
        <input type="radio" name="genero" id="genero">
        <label for="feminino">feminino</label>

         <input type="radio" name="genero" id="genero">
        <label for="masculino">masculino</label>
    </form>
</body>
</html>
